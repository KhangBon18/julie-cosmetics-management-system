name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  backend:
    name: Backend Smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run smoke check
        run: npm run smoke:ci

      - name: Detect backend tests
        id: detect-tests
        shell: bash
        run: |
          HAS_TEST_SCRIPT=$(node -e "const p=require('./package.json'); process.stdout.write(String(Boolean(p.scripts && p.scripts.test)));")
          HAS_TEST_FILES=$(find . -path ./node_modules -prune -o -type f \( -name "*.test.js" -o -name "*.spec.js" -o -name "*.test.cjs" -o -name "*.spec.cjs" -o -name "*.test.mjs" -o -name "*.spec.mjs" -o -path "*/__tests__/*" \) -print | head -n 1)

          if [[ "$HAS_TEST_SCRIPT" == "true" && -n "$HAS_TEST_FILES" ]]; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tests
        if: steps.detect-tests.outputs.has_tests == 'true'
        run: npm test

      - name: Skip tests
        if: steps.detect-tests.outputs.has_tests != 'true'
        run: echo "No backend tests detected; skipping npm test"
